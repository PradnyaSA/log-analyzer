metrics_to_run:
  - multi_turn_tool_use_quality   # built-in: checks tool selection and argument correctness
  - rca_rubric_quality            # custom LLM: per-case rubric evaluation (citation, root cause, HITL)
  - rca_tool_sequence             # custom code: verifies required tools were called in correct order

custom_metrics:
  - name: rca_rubric_quality
    prompt_template: |
      You are an expert evaluator for an AI-powered incident root-cause analysis (RCA) agent.
      The agent receives anomaly events from a Pub/Sub stream, reads audit logs, and produces
      grounded RCA reports with exact log-line citations before pausing for human approval.

      Evaluate the agent's response against the rubric criteria below.

      User Prompt (Pub/Sub anomaly event): {prompt}
      Agent Final Response: {response}
      Full Agent Trace (tool calls, intermediate steps): {agent_data}
      Rubric criteria to evaluate: {rubric}

      For each rubric criterion, determine whether the agent's behavior satisfies it.
      A criterion is satisfied only if there is clear evidence in the trace or response — not
      if it was merely possible or implied.

      Return a valid JSON object:
      {
        "score": <float between 0.0 and 1.0, where 1.0 = all criteria fully satisfied>,
        "explanation": "<per-criterion verdict: state which criteria passed and which failed, with evidence from the trace>"
      }

  - name: rca_tool_sequence
    custom_function: |
      def evaluate(instance):
          """
          Verifies that the expected tool call sequence occurred in the trace.

          Case types (detected from eval_case_id):
            below_threshold / malformed → no tool calls expected
            reject_once_*               → read_log_window ×2, emit_rca_log ×2,
                                          file_jira_ticket ×1 (after retry), no premature writes
            reject_twice_* / escalat*   → read_log_window ×3, emit_rca_log ×3,
                                          file_jira_ticket ×1, update_incident_status ×1
            everything else             → read_log_window before emit_rca_log, no premature writes
          """
          agent_data = instance.get("agent_data") or {}
          turns = agent_data.get("turns", [])

          # Flatten all function_call names across all events
          tool_calls = []
          for turn in turns:
              for event in turn.get("events", []):
                  content = event.get("content", {})
                  for part in content.get("parts", []):
                      fc = part.get("function_call")
                      if fc:
                          tool_calls.append(fc.get("name", ""))

          case_id = instance.get("eval_case_id", "")

          # ── No-tool cases ──────────────────────────────────────────────────
          if "below_threshold" in case_id or "malformed" in case_id:
              if tool_calls:
                  return {
                      "score": 0.0,
                      "explanation": f"Expected no tool calls but found: {tool_calls}"
                  }
              return {"score": 1.0, "explanation": "Correct: no tool calls for this case."}

          read_count = tool_calls.count("read_log_window")
          emit_count = tool_calls.count("emit_rca_log")
          has_jira   = "file_jira_ticket" in tool_calls
          has_status = "update_incident_status" in tool_calls

          # ── Reject-once path (reject → retry → acknowledge) ────────────────
          if "reject_once" in case_id:
              issues = []
              if read_count < 2:
                  issues.append(f"read_log_window called {read_count}x — expected ≥2 (initial + retry)")
              if emit_count < 2:
                  issues.append(f"emit_rca_log called {emit_count}x — expected ≥2 (initial + retry)")
              if not has_jira:
                  issues.append("file_jira_ticket not called — must be filed after retry acknowledge")
              if issues:
                  return {"score": max(0.0, 1.0 - 0.25 * len(issues)), "explanation": "; ".join(issues)}
              return {
                  "score": 1.0,
                  "explanation": (
                      f"Correct: read_log_window ×{read_count}, emit_rca_log ×{emit_count}, "
                      "file_jira_ticket called after retry acknowledge."
                  )
              }

          # ── Reject-twice / escalation path ─────────────────────────────────
          if "reject_twice" in case_id or "escalat" in case_id:
              issues = []
              if read_count < 3:
                  issues.append(f"read_log_window called {read_count}x — expected ≥3 (initial + 2 retries)")
              if emit_count < 3:
                  issues.append(f"emit_rca_log called {emit_count}x — expected ≥3 (initial + 2 retries)")
              if not has_jira:
                  issues.append("file_jira_ticket not called — must be filed on escalation")
              if not has_status:
                  issues.append("update_incident_status not called")
              if issues:
                  return {"score": max(0.0, 1.0 - 0.25 * len(issues)), "explanation": "; ".join(issues)}
              return {
                  "score": 1.0,
                  "explanation": (
                      f"Correct escalation path: read_log_window ×{read_count}, "
                      f"emit_rca_log ×{emit_count}, file_jira_ticket and update_incident_status called."
                  )
              }

          # ── Standard above-threshold case ──────────────────────────────────
          if not read_count and not emit_count:
              return {"score": 0.0, "explanation": "Neither read_log_window nor emit_rca_log was called."}
          if not read_count:
              return {"score": 0.25, "explanation": "emit_rca_log called but read_log_window missing."}
          if not emit_count:
              return {"score": 0.5, "explanation": "read_log_window called but emit_rca_log missing."}

          read_idx = tool_calls.index("read_log_window")
          emit_idx = tool_calls.index("emit_rca_log")
          if read_idx > emit_idx:
              return {"score": 0.5, "explanation": "emit_rca_log called before read_log_window — wrong order."}

          return {
              "score": 1.0,
              "explanation": (
                  f"Correct: read_log_window (idx {read_idx}) → emit_rca_log (idx {emit_idx})."
              )
          }
